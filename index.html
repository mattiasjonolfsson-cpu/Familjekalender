<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#faf7f2"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Familjekalender"/>
  <link rel="manifest" href="manifest.json"/>
  <title>Familjekalender</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf7f2;
      --paper: #ffffff;
      --ink: #1a1a1a;
      --ink-light: #6b6560;
      --ink-faint: #c5bfb8;
      --accent: #c0392b;
      --accent-soft: #fdf0ef;
      --blue: #2c6e9e;
      --blue-soft: #eef4fa;
      --green: #2d7a4f;
      --green-soft: #edf7f2;
      --gold: #b8860b;
      --gold-soft: #fdf8e8;
      --border: #e8e2da;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
      --radius: 10px;
      --today-ring: #c0392b;
    }

    html { background: var(--bg); }

    body {
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      min-height: 100dvh;
      background: var(--bg);
    }

    /* ── HEADER ── */
    header {
      background: var(--paper);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px 12px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }
    .header-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .month-nav { display: flex; align-items: center; gap: 12px; }
    .nav-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg);
      cursor: pointer; font-size: 16px; color: var(--ink-light);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .nav-btn:hover { background: var(--ink); color: white; border-color: var(--ink); }
    .month-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(18px, 4vw, 24px);
      font-weight: 700;
      min-width: 200px; text-align: center;
    }
    .today-btn {
      padding: 7px 14px; border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500;
      color: var(--ink-light); cursor: pointer;
      transition: all 0.15s;
    }
    .today-btn:hover { background: var(--ink); color: white; border-color: var(--ink); }

    /* Day headers */
    .day-headers {
      display: grid;
      grid-template-columns: 36px repeat(7, 1fr);
      gap: 2px;
    }
    .day-header {
      text-align: center;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-faint);
      padding: 4px 0;
    }
    .day-header.weekend { color: var(--accent); }

    /* ── CALENDAR GRID ── */
    .calendar-wrap {
      padding: 12px 12px 80px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: 36px repeat(7, 1fr);
      gap: 3px;
    }

    /* Week number */
    .week-num {
      display: flex; align-items: flex-start; justify-content: center;
      padding-top: 8px;
      font-size: 10px;
      font-weight: 500;
      color: var(--ink-faint);
      letter-spacing: 0.05em;
    }

    /* Day cell */
    .day-cell {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      min-height: clamp(80px, 14vw, 120px);
      padding: 6px 8px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      position: relative;
      overflow: hidden;
    }
    .day-cell:hover { border-color: var(--ink-faint); box-shadow: var(--shadow); }
    .day-cell.other-month { background: #f5f2ee; opacity: 0.5; }
    .day-cell.today {
      border-color: var(--today-ring) !important;
      border-width: 2px;
      box-shadow: 0 0 0 1px var(--today-ring);
    }
    .day-cell.weekend .day-num { color: var(--accent); }
    .day-cell.holiday { background: var(--accent-soft); }

    .day-num {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      font-weight: 600;
      line-height: 1;
      margin-bottom: 3px;
    }
    .nameday {
      font-size: 10px;
      color: var(--blue);
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .holiday-label {
      font-size: 10px;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 3px;
      line-height: 1.2;
    }
    .event-chip {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
    }
    .event-chip.blue  { background: var(--blue-soft);  color: var(--blue); }
    .event-chip.green { background: var(--green-soft); color: var(--green); }
    .event-chip.gold  { background: var(--gold-soft);  color: var(--gold); }
    .event-chip.red   { background: var(--accent-soft);color: var(--accent); }
    .event-chip.gray  { background: #f0ede8; color: var(--ink-light); }
    .more-events { font-size: 10px; color: var(--ink-faint); margin-top: 2px; }

    /* ── MODAL ── */
    .overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(26,26,26,0.45);
      backdrop-filter: blur(4px);
      display: flex; align-items: flex-end;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--paper);
      width: 100%; max-width: 520px;
      margin: 0 auto;
      border-radius: 20px 20px 0 0;
      padding: 24px 24px calc(24px + env(safe-area-inset-bottom));
      transform: translateY(40px);
      transition: transform 0.25s cubic-bezier(0.34,1.2,0.64,1);
      max-height: 90dvh;
      overflow-y: auto;
    }
    .overlay.open .modal { transform: translateY(0); }
    .modal-handle {
      width: 40px; height: 4px; border-radius: 2px;
      background: var(--ink-faint);
      margin: 0 auto 20px;
    }
    .modal-date {
      font-family: 'Playfair Display', serif;
      font-size: 22px; font-weight: 700;
      margin-bottom: 4px;
    }
    .modal-meta { font-size: 13px; color: var(--ink-light); margin-bottom: 20px; }

    /* Events list in modal */
    .modal-events { margin-bottom: 20px; }
    .modal-event-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      background: var(--bg);
      margin-bottom: 6px;
      position: relative;
    }
    .modal-event-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .dot-blue  { background: var(--blue); }
    .dot-green { background: var(--green); }
    .dot-gold  { background: var(--gold); }
    .dot-red   { background: var(--accent); }
    .dot-gray  { background: var(--ink-faint); }
    .modal-event-text { flex: 1; font-size: 14px; }
    .modal-event-delete {
      background: none; border: none; cursor: pointer;
      font-size: 16px; color: var(--ink-faint); padding: 4px;
      border-radius: 4px; transition: color 0.15s;
      display: none;
    }
    .modal-event-delete:hover { color: var(--accent); }
    .unlocked .modal-event-delete { display: block; }

    /* Add event form */
    .add-form { display: none; }
    .unlocked .add-form { display: block; }
    .add-form h4 {
      font-size: 13px; font-weight: 500; color: var(--ink-light);
      margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.08em;
    }
    .form-row { margin-bottom: 10px; }
    .form-row input, .form-row textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      background: var(--bg);
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
    }
    .form-row input:focus, .form-row textarea:focus { border-color: var(--blue); }
    .form-row textarea { resize: none; height: 70px; }
    .color-row {
      display: flex; gap: 8px; margin-bottom: 14px;
    }
    .color-opt {
      width: 28px; height: 28px; border-radius: 50%;
      cursor: pointer; border: 2px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
    }
    .color-opt:hover { transform: scale(1.15); }
    .color-opt.selected { border-color: var(--ink); transform: scale(1.15); }
    .color-opt.blue  { background: var(--blue); }
    .color-opt.green { background: var(--green); }
    .color-opt.gold  { background: var(--gold); }
    .color-opt.red   { background: var(--accent); }
    .color-opt.gray  { background: #9e9890; }

    .btn-add {
      width: 100%; padding: 12px;
      border-radius: 10px; border: none;
      background: var(--ink);
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 500;
      cursor: pointer; transition: opacity 0.15s;
    }
    .btn-add:hover { opacity: 0.85; }

    /* Lock bar */
    .lock-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      background: var(--bg);
      border-radius: 10px;
      margin-bottom: 16px;
    }
    .lock-status { font-size: 13px; color: var(--ink-light); display: flex; align-items: center; gap: 6px; }
    .lock-icon { font-size: 16px; }
    .btn-unlock {
      padding: 7px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--paper);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500;
      color: var(--ink); cursor: pointer;
      transition: all 0.15s;
    }
    .btn-unlock:hover { background: var(--ink); color: white; border-color: var(--ink); }
    .btn-lock {
      padding: 7px 14px;
      border-radius: 8px;
      border: none;
      background: var(--accent-soft);
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500;
      cursor: pointer;
    }

    /* Password modal */
    .pw-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(26,26,26,0.5);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .pw-overlay.open { opacity: 1; pointer-events: all; }
    .pw-box {
      background: var(--paper);
      border-radius: 16px;
      padding: 32px 28px;
      width: 100%; max-width: 340px;
      text-align: center;
      transform: scale(0.95);
      transition: transform 0.2s;
    }
    .pw-overlay.open .pw-box { transform: scale(1); }
    .pw-box h3 {
      font-family: 'Playfair Display', serif;
      font-size: 20px; margin-bottom: 8px;
    }
    .pw-box p { font-size: 13px; color: var(--ink-light); margin-bottom: 20px; }
    .pw-input {
      width: 100%; padding: 12px 16px;
      border: 1px solid var(--border); border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 16px;
      text-align: center; letter-spacing: 0.2em;
      background: var(--bg); color: var(--ink);
      outline: none; margin-bottom: 12px;
      transition: border-color 0.15s;
    }
    .pw-input:focus { border-color: var(--blue); }
    .pw-input.error { border-color: var(--accent); animation: shake 0.3s ease; }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
    }
    .btn-pw {
      width: 100%; padding: 12px;
      border-radius: 10px; border: none;
      background: var(--ink); color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 500;
      cursor: pointer; margin-bottom: 10px;
    }
    .btn-pw-cancel {
      background: none; border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; color: var(--ink-light);
      cursor: pointer; padding: 6px;
    }

    /* Loading state */
    .loading-chip {
      font-size: 10px; color: var(--ink-faint);
      padding: 2px 0;
    }

    /* Firebase setup notice */
    .setup-notice {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--ink); color: white;
      padding: 12px 20px; border-radius: 12px;
      font-size: 13px; max-width: 90vw; text-align: center;
      z-index: 500; display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }
    .setup-notice.show { display: block; }
    .setup-notice a { color: #7ec8e3; }

    @media (min-width: 700px) {
      .day-cell { min-height: 110px; }
      .modal { border-radius: 16px; margin-bottom: 40px; }
      .overlay { align-items: center; }
    }
    @media (max-width: 480px) {
      .calendar-wrap { padding: 8px 6px 80px; }
      .calendar-grid { gap: 2px; }
      .day-cell { min-height: 68px; padding: 4px 5px; }
      .day-num { font-size: 13px; }
      .nameday, .holiday-label, .event-chip { font-size: 9px; }
      .week-num { font-size: 9px; }
      .month-title { min-width: 160px; font-size: 18px; }
    }
  </style>
</head>

const MONTHS_SV = ["Januari","Februari","Mars","April","Maj","Juni","Juli","Augusti","September","Oktober","November","December"];

// Swedish public holidays (fixed)
function getHolidays(year) {
  const h = {};
  const set = (m, d, name) => { h[`${year}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`] = name; };
  set(1,1,"Nyårsdagen"); set(1,6,"Trettondedag jul");
  set(5,1,"Första maj"); set(6,6,"Nationaldagen");
  set(12,24,"Julafton"); set(12,25,"Juldagen");
  set(12,26,"Annandag jul"); set(12,31,"Nyårsafton");
  // Easter-based
  const e = easter(year);
  const addDays = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
  const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  h[fmt(addDays(e,-3))]  = "Skärtorsdagen";
  h[fmt(addDays(e,-2))]  = "Långfredagen";
  h[fmt(e)]              = "Påskdagen";
  h[fmt(addDays(e,1))]   = "Annandag påsk";
  h[fmt(addDays(e,39))]  = "Kristi himmelsfärdsdag";
  h[fmt(addDays(e,49))]  = "Pingstdagen";
  // Midsommar (Saturday between June 20–26)
  let mid = new Date(year,5,20);
  while(mid.getDay()!==6) mid.setDate(mid.getDate()+1);
  h[fmt(addDays(mid,-1))] = "Midsommarafton";
  h[fmt(mid)]             = "Midsommardagen";
  // Alla helgons dag (Saturday between Oct 31–Nov 6)
  let allh = new Date(year,9,31);
  while(allh.getDay()!==6) allh.setDate(allh.getDate()+1);
  h[fmt(allh)] = "Alla helgons dag";
  return h;
}

function easter(year) {
  const a=year%19,b=Math.floor(year/100),c=year%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),month=Math.floor((h+l-7*m+114)/31),day=((h+l-7*m+114)%31)+1;
  return new Date(year,month-1,day);
}

function getNameday(month, day) {
  const key = `${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  return NAMEDAYS[key] || "";
}

function getWeekNumber(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

function dateKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

// State
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let events = {}; // { "2025-03-14": [{id, title, note, color}] }
let selectedDate = null;
let selectedColor = 'blue';
let isUnlocked = localStorage.getItem('kalender_unlocked') === 'true';
let db = null;
let firebaseOk = false;

// Init Firebase
try {
  if (FIREBASE_CONFIG.apiKey !== "DIN_API_KEY") {
    const app = initializeApp(FIREBASE_CONFIG);
    db = getDatabase(app);
    firebaseOk = true;
    // Listen to all events
    const eventsRef = ref(db, 'events');
    onValue(eventsRef, snapshot => {
      events = snapshot.val() || {};
      renderCalendar();
      if (selectedDate) updateModalEvents();
    });
  } else {
    document.getElementById('setupNotice').classList.add('show');
  }
} catch(e) {
  console.warn('Firebase init failed', e);
  document.getElementById('setupNotice').classList.add('show');
}

// Render calendar
function renderCalendar() {
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  const holidays = getHolidays(currentYear);
  const today = new Date();

  document.getElementById('monthTitle').textContent =
    `${MONTHS_SV[currentMonth]} ${currentYear}`;

  // First day of month (Monday=0)
  const firstDay = new Date(currentYear, currentMonth, 1);
  const startDow = (firstDay.getDay() + 6) % 7; // 0=Mon
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate();

  let cellDate = new Date(currentYear, currentMonth, 1 - startDow);
  let weekRendered = new Set();

  const totalCells = Math.ceil((startDow + daysInMonth) / 7) * 7;

  for (let i = 0; i < totalCells; i++) {
    const dow = i % 7;

    // Week number column
    if (dow === 0) {
      const wn = getWeekNumber(cellDate);
      if (!weekRendered.has(wn)) {
        weekRendered.add(wn);
        const wnEl = document.createElement('div');
        wnEl.className = 'week-num';
        wnEl.textContent = wn;
        grid.appendChild(wnEl);
      }
    }

    const y = cellDate.getFullYear();
    const m = cellDate.getMonth();
    const d = cellDate.getDate();
    const isCurrentMonth = m === currentMonth && y === currentYear;
    const isToday = d === today.getDate() && m === today.getMonth() && y === today.getFullYear();
    const isWeekend = dow >= 5;
    const dk = dateKey(y, m, d);
    const holiday = holidays[dk];

    const cell = document.createElement('div');
    cell.className = 'day-cell' +
      (isCurrentMonth ? '' : ' other-month') +
      (isToday ? ' today' : '') +
      (isWeekend ? ' weekend' : '') +
      (holiday ? ' holiday' : '');

    // Day number
    const numEl = document.createElement('div');
    numEl.className = 'day-num';
    numEl.textContent = d;
    cell.appendChild(numEl);

    // Nameday
    const nd = getNameday(m + 1, d);
    if (nd && isCurrentMonth) {
      const ndEl = document.createElement('div');
      ndEl.className = 'nameday';
      ndEl.textContent = nd;
      cell.appendChild(ndEl);
    }

    // Holiday
    if (holiday && isCurrentMonth) {
      const hEl = document.createElement('div');
      hEl.className = 'holiday-label';
      hEl.textContent = holiday;
      cell.appendChild(hEl);
    }

    // Events
    const dayEvents = events[dk] ? Object.entries(events[dk]) : [];
    const maxShow = 2;
    dayEvents.slice(0, maxShow).forEach(([, ev]) => {
      const chip = document.createElement('div');
      chip.className = `event-chip ${ev.color || 'blue'}`;
      chip.textContent = ev.title;
      cell.appendChild(chip);
    });
    if (dayEvents.length > maxShow) {
      const more = document.createElement('div');
      more.className = 'more-events';
      more.textContent = `+${dayEvents.length - maxShow} till`;
      cell.appendChild(more);
    }

    cell.addEventListener('click', () => openModal(y, m, d));
    grid.appendChild(cell);

    cellDate.setDate(cellDate.getDate() + 1);
  }
}

// Modal
function openModal(y, m, d) {
  selectedDate = { y, m, d };
  const dk = dateKey(y, m, d);
  const holidays = getHolidays(y);
  const nd = getNameday(m + 1, d);
  const holiday = holidays[dk];

  const dateObj = new Date(y, m, d);
  const dayName = DAYS_SV[(dateObj.getDay() + 6) % 7];
  document.getElementById('modalDate').textContent =
    `${dayName.charAt(0).toUpperCase() + dayName.slice(1)} ${d} ${MONTHS_SV[m].toLowerCase()} ${y}`;

  let meta = [];
  if (nd) meta.push(`Namnsdag: ${nd}`);
  if (holiday) meta.push(`🎉 ${holiday}`);
  document.getElementById('modalMeta').textContent = meta.join(' · ');

  updateModalEvents();
  document.getElementById('eventTitle').value = '';
  document.getElementById('eventNote').value = '';

  updateLockUI();
  document.getElementById('overlay').classList.add('open');
}

function updateModalEvents() {
  if (!selectedDate) return;
  const { y, m, d } = selectedDate;
  const dk = dateKey(y, m, d);
  const container = document.getElementById('modalEvents');
  container.innerHTML = '';
  const dayEvents = events[dk] ? Object.entries(events[dk]) : [];
  if (dayEvents.length === 0) {
    container.innerHTML = '<div style="font-size:13px;color:var(--ink-faint);padding:8px 0;">Inga händelser denna dag.</div>';
    return;
  }
  dayEvents.forEach(([id, ev]) => {
    const item = document.createElement('div');
    item.className = 'modal-event-item';
    item.innerHTML = `
      <div class="modal-event-dot dot-${ev.color||'blue'}"></div>
      <div class="modal-event-text">
        <strong>${ev.title}</strong>
        ${ev.note ? `<br><span style="font-size:12px;color:var(--ink-light)">${ev.note}</span>` : ''}
      </div>
      <button class="modal-event-delete" data-id="${id}" data-dk="${dk}">✕</button>
    `;
    container.appendChild(item);
  });
  document.querySelectorAll('.modal-event-delete').forEach(btn => {
    btn.addEventListener('click', async e => {
      e.stopPropagation();
      const id = btn.dataset.id;
      const dk = btn.dataset.dk;
      if (firebaseOk && db) {
        await remove(ref(db, `events/${dk}/${id}`));
      } else {
        if (!events[dk]) return;
        delete events[dk][id];
        renderCalendar();
        updateModalEvents();
      }
    });
  });
}

function updateLockUI() {
  const modal = document.getElementById('modal');
  const lockIcon = document.getElementById('lockIcon');
  const lockText = document.getElementById('lockText');
  const unlockBtn = document.getElementById('unlockBtn');
  if (isUnlocked) {
    modal.classList.add('unlocked');
    lockIcon.textContent = '🔓';
    lockText.textContent = 'Upplåst – du kan redigera';
    unlockBtn.textContent = 'Lås';
    unlockBtn.className = 'btn-lock';
  } else {
    modal.classList.remove('unlocked');
    lockIcon.textContent = '🔒';
    lockText.textContent = 'Låst – ange lösenord för att redigera';
    unlockBtn.textContent = 'Lås upp';
    unlockBtn.className = 'btn-unlock';
  }
}

// Color picker
document.querySelectorAll('.color-opt').forEach(opt => {
  opt.addEventListener('click', () => {
    document.querySelectorAll('.color-opt').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
    selectedColor = opt.dataset.color;
  });
});

// Add event
document.getElementById('addBtn').addEventListener('click', async () => {
  const title = document.getElementById('eventTitle').value.trim();
  if (!title || !selectedDate) return;
  const { y, m, d } = selectedDate;
  const dk = dateKey(y, m, d);
  const note = document.getElementById('eventNote').value.trim();
  const newEvent = { title, note, color: selectedColor, created: Date.now() };

  if (firebaseOk && db) {
    await push(ref(db, `events/${dk}`), newEvent);
  } else {
    if (!events[dk]) events[dk] = {};
    events[dk][Date.now()] = newEvent;
    renderCalendar();
    updateModalEvents();
  }
  document.getElementById('eventTitle').value = '';
  document.getElementById('eventNote').value = '';
});

// Lock/unlock
document.getElementById('unlockBtn').addEventListener('click', () => {
  if (isUnlocked) {
    isUnlocked = false;
    localStorage.removeItem('kalender_unlocked');
    updateLockUI();
  } else {
    document.getElementById('pwOverlay').classList.add('open');
    document.getElementById('pwInput').value = '';
    setTimeout(() => document.getElementById('pwInput').focus(), 100);
  }
});

document.getElementById('pwSubmit').addEventListener('click', () => {
  const val = document.getElementById('pwInput').value;
  if (val === EDIT_PASSWORD) {
    isUnlocked = true;
    localStorage.setItem('kalender_unlocked', 'true');
    document.getElementById('pwOverlay').classList.remove('open');
    updateLockUI();
  } else {
    const inp = document.getElementById('pwInput');
    inp.classList.add('error');
    inp.value = '';
    setTimeout(() => inp.classList.remove('error'), 400);
  }
});
document.getElementById('pwInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('pwSubmit').click();
});
document.getElementById('pwCancel').addEventListener('click', () => {
  document.getElementById('pwOverlay').classList.remove('open');
});

// Close modal on overlay click
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay'))
    document.getElementById('overlay').classList.remove('open');
});

// Navigation
document.getElementById('prevBtn').addEventListener('click', () => {
  currentMonth--; if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar();
});
document.getElementById('nextBtn').addEventListener('click', () => {
  currentMonth++; if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  renderCalendar();
});
document.getElementById('todayBtn').addEventListener('click', () => {
  currentYear = new Date().getFullYear();
  currentMonth = new Date().getMonth();
  renderCalendar();
});

// Initial render (before Firebase loads)
renderCalendar();
</script>
